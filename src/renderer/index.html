<!doctype html>
<html lang="">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self';"
    />
    <title>Revel</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body,
      #app {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI Variable", "Segoe UI", system-ui, sans-serif;
        background: #f3f3f3;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: #202020;
        }
      }
      #splash {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f3f3f3;
      }
      #splash-spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #e0e0e0;
        border-top-color: #0078d4;
        border-radius: 50%;
        animation: splash-spin 1s linear infinite;
      }
      @keyframes splash-spin {
        to {
          transform: rotate(360deg);
        }
      }
      @media (prefers-color-scheme: dark) {
        #splash {
          background: #202020;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="splash">
        <div id="splash-spinner"></div>
      </div>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
