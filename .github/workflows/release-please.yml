name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # release-please 会自动从 release-please-config.json 读取配置
          token: ${{ secrets.GITHUB_TOKEN }}
