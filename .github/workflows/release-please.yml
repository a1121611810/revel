name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      pr: ${{ steps.release.outputs.pr }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - name: Enable auto-merge on release PR
        if: ${{ steps.release.outputs.pr != '' }}
        uses: actions/checkout@v4

      - name: Auto-merge the release PR
        if: ${{ steps.release.outputs.pr != '' }}
        run: |
          PR_NUMBER=$(echo '${{ steps.release.outputs.pr }}' | python3 -c "import sys,json;print(json.load(sys.stdin)['number'])")
          gh pr merge --merge --auto "$PR_NUMBER"
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
