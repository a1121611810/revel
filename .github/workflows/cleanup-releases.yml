name: Cleanup Old Releases

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete old v3.x releases
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          for tag in v3.0.0 v3.0.1 v3.0.2 v3.0.3 v3.0.4 v3.0.5 revel-v2.0.0 revel-v3.0.0 v2.0.0 v2.0.1 v2.0.2; do
            # Delete the GitHub Release if it exists
            gh release delete "$tag" --yes --cleanup-tag 2>/dev/null || true
            echo "Cleaned up: $tag"
          done
          echo "Done!"
